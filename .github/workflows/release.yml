name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  lint-rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Lint (Rust)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  test-rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Test (Rust)
        run: cargo test --manifest-path src-tauri/Cargo.toml

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Test (frontend)
        run: npx vitest run

  release:
    needs: [lint-rust, test-rust, test-frontend]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # Object-level compilation cache (complements rust-cache's target-dir
      # cache): rust-cache misses whenever Cargo.lock changes at all, even if
      # an unrelated dependency bumped and vendored OpenSSL's own inputs are
      # untouched. sccache still gets a hit on those unchanged compilation
      # units, so re-releases don't always pay the full vendored-OpenSSL
      # compile cost twice (once per target triple).
      - uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install frontend dependencies
        run: npm ci

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          NOTES=$(git cliff --tag "$TAG" --current --strip header 2>/dev/null || echo "")
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Warn if Sentry DSN is absent
        env:
          NADEN_SENTRY_DSN: ${{ secrets.NADEN_SENTRY_DSN }}
        run: |
          if [ -z "$NADEN_SENTRY_DSN" ]; then
            echo "::warning::NADEN_SENTRY_DSN secret is not set — crash reporting will be disabled in this release."
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Crash reporting (opt-out) — both Rust and Vite/frontend read from the same secret.
          # Without it, the Settings toggle is disabled and no events are sent.
          NADEN_SENTRY_DSN: ${{ secrets.NADEN_SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.NADEN_SENTRY_DSN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "naden ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "${{ steps.notes.outputs.body }}"
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
