name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: vars
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Download dmg asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern "SSHelter_*_aarch64.dmg" \
            --output sshelter.dmg

      - name: Compute sha256
        id: sha
        run: echo "sha256=$(shasum -a 256 sshelter.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update tap cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.vars.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/adenijiayocharles/homebrew-sshelter.git" tap
          cd tap
          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s/sha256 \".*\"/sha256 \"${SHA256}\"/" \
            Casks/sshelter.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/sshelter.rb
          if git diff --cached --quiet; then
            echo "No changes to cask, skipping commit"
            exit 0
          fi
          git commit -m "sshelter ${VERSION}"
          git push origin main
